<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Canada — History Timeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    /* ─── Design tokens ──────────────────────────────────── */
    :root {
      --red:          #C8102E;
      --red-dark:     #8B0000;
      --red-mid:      #A50D25;
      --red-glow:     rgba(200, 16, 46, 0.25);
      --red-glow-lg:  rgba(200, 16, 46, 0.12);

      --bg:           #0D0D15;
      --bg2:          #10101A;
      --surface:      #13131F;
      --surface2:     #1A1A2E;
      --surface3:     #1F1F35;
      --border:       rgba(255,255,255,0.07);
      --border-red:   rgba(200,16,46,0.3);

      --text:         #F0F0F5;
      --text-muted:   #7777AA;
      --text-dim:     #44445A;
      --white:        #FFFFFF;

      --font-body:    'Inter', system-ui, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;

      --radius-sm:    6px;
      --radius:       12px;
      --radius-lg:    18px;
      --radius-xl:    24px;

      --transition:   0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-lg: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

      --header-h:     64px;
      --filter-h:     56px;
    }

    /* ─── Era colors ─────────────────────────────────────── */
    :root {
      --era-pre-european:  #8B6914;
      --era-exploration:   #2E7D32;
      --era-new-france:    #1565C0;
      --era-british:       #6A1B9A;
      --era-war-1812:      #C62828;
      --era-confederation: #E65100;
      --era-ww1:           #546E7A;
      --era-interwar:      #558B2F;
      --era-ww2:           #6D4C41;
      --era-modern:        #00695C;
    }

    /* ─── Base ───────────────────────────────────────────── */
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Ambient red glow top-left */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--red-glow-lg) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── SVG connection overlay ─────────────────────────── */
    #connection-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 50;
    }

    .conn-line {
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0;
      animation: drawLine 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes drawLine {
      to { opacity: 0.7; stroke-dashoffset: 0; }
    }

    /* ─── Header ─────────────────────────────────────────── */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(13, 13, 21, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-maple {
      font-size: 22px;
      line-height: 1;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--white);
      white-space: nowrap;
    }

    .header-title span {
      color: var(--red);
    }

    /* Tab nav */
    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .tab-btn.active {
      background: var(--red);
      color: var(--white);
      box-shadow: 0 2px 12px var(--red-glow);
    }

    /* Progress indicator */
    .header-progress {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .header-progress strong {
      color: var(--red);
    }

    /* ─── Era filters + Search bar ───────────────────────── */
    #filter-bar {
      position: sticky;
      top: var(--header-h);
      z-index: 90;
      background: rgba(13, 13, 21, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: var(--filter-h);
      overflow: hidden;
    }

    /* Search */
    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
    }

    #search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 7px 12px 7px 32px;
      width: 200px;
      outline: none;
      transition: var(--transition);
    }

    #search-input::placeholder { color: var(--text-dim); }

    #search-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-glow);
      width: 240px;
    }

    /* Era pill filters */
    .era-filters {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }

    .era-filters::-webkit-scrollbar { display: none; }

    .era-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .era-pill:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }

    .era-pill.active {
      color: var(--white);
      border-color: transparent;
    }

    /* ─── Main content ───────────────────────────────────── */
    #main-content {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ─── Timeline ───────────────────────────────────────── */
    #timeline-view { display: block; }
    #people-view   { display: none; }
    #quiz-view     { display: none; }

    /* Timeline spine */
    .timeline-list {
      position: relative;
      padding-left: 110px;
    }

    .timeline-list::before {
      content: '';
      position: absolute;
      left: 72px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: linear-gradient(to bottom,
        transparent,
        var(--border) 5%,
        var(--border) 95%,
        transparent
      );
    }

    /* Timeline item */
    .timeline-item {
      position: relative;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .timeline-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .timeline-item.hidden {
      display: none;
    }

    /* Year badge */
    .tl-year {
      position: absolute;
      left: -110px;
      top: 16px;
      width: 64px;
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    /* Dot on the spine */
    .tl-dot {
      position: absolute;
      left: -38px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      transition: transform var(--transition), box-shadow var(--transition);
      z-index: 2;
    }

    .timeline-item:hover .tl-dot,
    .timeline-item.selected .tl-dot {
      transform: scale(1.4);
    }

    /* Card */
    .tl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      border-left-width: 3px;
      position: relative;
      overflow: hidden;
    }

    .tl-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
      pointer-events: none;
    }

    .tl-card:hover {
      background: var(--surface2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .timeline-item.selected .tl-card {
      background: var(--surface2);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .tl-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .tl-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.4;
    }

    .tl-era-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      opacity: 0.85;
      flex-shrink: 0;
      color: var(--white);
    }

    .tl-expand-icon {
      color: var(--text-dim);
      font-size: 11px;
      transition: transform var(--transition);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .timeline-item.selected .tl-expand-icon {
      transform: rotate(180deg);
    }

    /* Expanded body */
    .tl-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .timeline-item.selected .tl-body {
      max-height: 600px;
    }

    .tl-description {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text-muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .tl-connections {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tl-connections-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface3);
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .chip:hover {
      color: var(--white);
      border-color: rgba(255,255,255,0.2);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Studied badge */
    .studied-btn {
      margin-top: 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .studied-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    .studied-btn.studied {
      background: rgba(0, 180, 100, 0.12);
      border-color: rgba(0, 180, 100, 0.3);
      color: #4CAF50;
    }

    .studied-check {
      font-size: 13px;
    }

    /* Studied overlay badge on card */
    .studied-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 11px;
      color: #4CAF50;
      opacity: 0.7;
    }

    /* ─── People grid ────────────────────────────────────── */
    #people-view {
      display: none;
    }

    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      border-left-width: 3px;
      opacity: 0;
      transform: translateY(12px);
      position: relative;
      overflow: hidden;
    }

    .person-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.015) 0%, transparent 60%);
      pointer-events: none;
    }

    .person-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .person-card.hidden {
      display: none;
    }

    .person-card:hover {
      background: var(--surface2);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }

    .person-card.selected {
      background: var(--surface2);
      border-color: rgba(255,255,255,0.15);
    }

    .person-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .person-role {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .person-era-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      color: var(--white);
      opacity: 0.85;
      display: inline-block;
    }

    .person-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .person-card.selected .person-body {
      max-height: 500px;
    }

    .person-description {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ─── Quiz view ──────────────────────────────────────── */
    #quiz-view {
      display: none;
    }

    .quiz-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .quiz-type-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
    }

    .quiz-type-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .quiz-type-btn:hover { color: var(--text); }

    .quiz-type-btn.active {
      background: var(--red);
      color: var(--white);
    }

    .quiz-progress-wrap {
      flex: 1;
      min-width: 160px;
    }

    .quiz-progress-text {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .quiz-progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-dark), var(--red));
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* Flip card */
    .quiz-card-scene {
      perspective: 1000px;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      height: 320px;
    }

    .quiz-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .quiz-card.flipped {
      transform: rotateY(180deg);
    }

    .quiz-card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      overflow: hidden;
    }

    .quiz-card-front {
      background: var(--surface);
    }

    .quiz-card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
    }

    .quiz-card-back {
      background: var(--surface2);
      transform: rotateY(180deg);
      align-items: flex-start;
      text-align: left;
    }

    .quiz-front-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .quiz-front-year {
      font-family: var(--font-display);
      font-size: 52px;
      color: var(--red);
      line-height: 1;
      margin-bottom: 12px;
      text-shadow: 0 0 40px var(--red-glow);
    }

    .quiz-front-era {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      color: var(--white);
      opacity: 0.8;
    }

    .quiz-front-name {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--white);
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .quiz-flip-hint {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .quiz-back-type {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .quiz-back-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .quiz-back-desc {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
      overflow-y: auto;
      max-height: 160px;
    }

    .quiz-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }

    .quiz-btn {
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 28px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .quiz-btn-again {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .quiz-btn-again:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    .quiz-btn-got-it {
      background: linear-gradient(135deg, var(--red-mid), var(--red));
      color: var(--white);
      box-shadow: 0 4px 16px var(--red-glow);
    }

    .quiz-btn-got-it:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--red-glow);
    }

    .quiz-complete {
      text-align: center;
      padding: 60px 24px;
    }

    .quiz-complete-icon {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .quiz-complete-title {
      font-family: var(--font-display);
      font-size: 28px;
      color: var(--white);

      color: var(--text-muted);

      padding: 60px 24px;
    }

      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 15px;
      color: var(--text-muted);
    }

    .era-section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 32px 0 16px;
      padding-left: 0;
    }

    .era-section-header:first-child {
      margin-top: 0;
    }

    .era-section-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: -6px; /* aligns with spine dot */
    }

      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

      flex: 1;
      height: 1px;
      background: var(--border);
    }

    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    @media (max-width: 600px) {
      :root { --header-h: 56px; }

      #app-header { padding: 0 16px; }
      .header-title { font-size: 15px; }
      .tab-btn { padding: 6px 12px; font-size: 12px; }
      .header-progress { display: none; }

      #filter-bar { padding: 0 16px; }
      #search-input { width: 150px; }
      #search-input:focus { width: 170px; }

      #main-content { padding: 24px 16px 60px; }
      .timeline-list { padding-left: 88px; }
      .timeline-list::before { left: 56px; }
      .tl-year { left: -88px; width: 48px; font-size: 11px; }
      .tl-dot { left: -31px; }

      .people-grid { grid-template-columns: 1fr; }
      .quiz-card-scene { height: 280px; }
      .quiz-front-year { font-size: 40px; }
    }

    /* ─── Chunk 9 — Polish & animations ─────────────────── */

    /* Page entrance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #app-header  { animation: fadeIn 0.4s ease; }
    #filter-bar  { animation: fadeIn 0.5s ease 0.05s both; }
    #main-content { animation: fadeIn 0.5s ease 0.1s both; }

    /* Timeline items — staggered slide-in */
    .timeline-item {
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }

    /* Person cards — staggered fade-up */
    .person-card {
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.22,1,0.36,1),
                  background var(--transition), box-shadow var(--transition);
    }

    /* Card hover lift */
    .tl-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .person-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* Selected card glow pulse */
    @keyframes selectedPulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 4px 32px rgba(0,0,0,0.5), 0 0 20px var(--red-glow); }
    }

    .timeline-item.selected .tl-card {
      animation: selectedPulse 2.5s ease-in-out infinite;
    }

    /* Chip hover */
    .chip:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Era pill active glow */
    .era-pill.active {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    /* Tab active underline hint */
    .tab-btn.active {
      box-shadow: 0 2px 12px var(--red-glow), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* Quiz card scene hover */
    .quiz-card-scene:hover .quiz-card:not(.flipped) {
      transform: rotateY(-4deg) translateY(-2px);
    }

    /* Fade-in content sections */
    .era-section-header {
      animation: fadeIn 0.3s ease both;
    }

    /* Subtle dot pulse when item selected */
    .timeline-item.selected .tl-dot {
      animation: dotPulse 1.5s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 6px currentColor; transform: scale(1.4); }
      50%       { box-shadow: 0 0 12px currentColor, 0 0 20px currentColor44; transform: scale(1.6); }
    }

    /* Search input clear animation */
    #search-input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
      height: 14px;
      width: 14px;
      cursor: pointer;
      background: var(--text-dim);
      border-radius: 50%;
      opacity: 0.6;
    }

    /* Bottom fade-out on main content */
    #main-content::after {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Progress bar shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .quiz-progress-fill {
      background-size: 200% auto;
      background-image: linear-gradient(90deg, var(--red-dark) 0%, var(--red) 50%, var(--red-dark) 100%);

    }

    /* Studied button transition */
    .studied-btn {
      transition: background var(--transition), color var(--transition),
                  border-color var(--transition), transform 0.15s ease;
    }

    .studied-btn:active {
      transform: scale(0.96);
    }

    /* Quiz buttons */
    .quiz-btn:active {
      transform: scale(0.97);
    }

    /* Connection lines fade in */
    .conn-line {
      transition: opacity 0.3s ease;
    }

    /* ─── Utility ────────────────────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>

    // ═══════════════════════════════════════════════════════
    // CHUNKS 3–8 — APP LOGIC
    // ═══════════════════════════════════════════════════════

    // ── Helpers ────────────────────────────────────────────
    const eraMap  = Object.fromEntries(ERAS.map(e => [e.id, e]));
    const eventMap = Object.fromEntries(EVENTS.map(e => [e.id, e]));
    const personMap = Object.fromEntries(PEOPLE.map(p => [p.id, p]));

    function eraColor(eraId) {
      return eraMap[eraId]?.color ?? '#555';
    }

    function eraName(eraId) {
      return eraMap[eraId]?.name ?? eraId;
    }

    // ── State ──────────────────────────────────────────────
    const state = {
      tab: 'timeline',         // 'timeline' | 'people' | 'quiz'
      era: null,               // null = all
      query: '',
      selectedId: null,        // id of selected event or person
      selectedType: null,      // 'event' | 'person'
      studied: new Set(JSON.parse(localStorage.getItem('ca_studied') || '[]')),
      quizType: 'mix',         // 'mix' | 'events' | 'people'
      quizDeck: [],
      quizIndex: 0,
      quizFlipped: false,
    };

    function saveStudied() {
      localStorage.setItem('ca_studied', JSON.stringify([...state.studied]));
    }

    // ── Filter logic ───────────────────────────────────────
    function filteredEvents() {
      return EVENTS.filter(e => {
        if (state.era && e.era !== state.era) return false;
        if (state.query) {
          const q = state.query.toLowerCase();
          return e.title.toLowerCase().includes(q) ||
                 e.description.toLowerCase().includes(q) ||
                 String(e.year).includes(q);
        }
        return true;
      });
    }

    function filteredPeople() {
      return PEOPLE.filter(p => {
        if (state.era && p.era !== state.era) return false;
        if (state.query) {
          const q = state.query.toLowerCase();
          return p.name.toLowerCase().includes(q) ||
                 p.role.toLowerCase().includes(q) ||
                 p.description.toLowerCase().includes(q);
        }
        return true;
      });
    }

    // ── Update header progress ─────────────────────────────
    function updateProgress() {
      const total = EVENTS.length + PEOPLE.length;
      document.getElementById('progress-count').textContent = state.studied.size;
      document.getElementById('progress-total').textContent = total;
    }

    // ── Era filter pills ───────────────────────────────────
    function renderEraFilters() {
      const container = document.getElementById('era-filters');
      container.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.className = 'era-pill' + (state.era === null ? ' active' : '');
      allBtn.textContent = 'All';
      if (state.era === null) allBtn.style.background = 'var(--red)';
      allBtn.addEventListener('click', () => { state.era = null; onFilterChange(); });
      container.appendChild(allBtn);

      ERAS.forEach(era => {
        const btn = document.createElement('button');
        btn.className = 'era-pill' + (state.era === era.id ? ' active' : '');
        btn.textContent = era.name;
        if (state.era === era.id) {
          btn.style.background = era.color;
          btn.style.borderColor = era.color;
        }
        btn.addEventListener('click', () => {
          state.era = (state.era === era.id) ? null : era.id;
          onFilterChange();
        });
        container.appendChild(btn);
      });
    }

    function onFilterChange() {
      renderEraFilters();
      clearConnections();
      state.selectedId = null;
      state.selectedType = null;
      if (state.tab === 'timeline') renderTimeline();
      if (state.tab === 'people')   renderPeople();
    }

    // ── CHUNK 3 — Timeline ─────────────────────────────────
    function renderTimeline() {
      const list = document.getElementById('timeline-list');
      const events = filteredEvents();

      if (events.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No events match your search.</div></div>`;
        return;
      }

      // Group by era in order
      const eraOrder = ERAS.map(e => e.id);
      const byEra = {};
      events.forEach(ev => {
        if (!byEra[ev.era]) byEra[ev.era] = [];
        byEra[ev.era].push(ev);
      });

      list.innerHTML = '';

      eraOrder.forEach(eraId => {
        if (!byEra[eraId]) return;
        const color = eraColor(eraId);

        // Era section header
        const header = document.createElement('div');
        header.className = 'era-section-header';
        header.innerHTML = `
          <div class="era-section-title" style="color:${color}">${eraName(eraId)}</div>
          <div class="era-section-line"></div>
        `;
        list.appendChild(header);

        byEra[eraId].forEach((ev, i) => {
          const item = createTimelineItem(ev);
          item.style.transitionDelay = `${i * 40}ms`;
          list.appendChild(item);
        });
      });

      // Intersection Observer for scroll-in animation
      // Use rootMargin to trigger slightly before fully in view
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });

      // Small RAF delay so elements are painted before we observe
      requestAnimationFrame(() => {
        list.querySelectorAll('.timeline-item').forEach(el => observer.observe(el));
      });
    }

    function createTimelineItem(ev) {
      const color = eraColor(ev.era);
      const isSelected = state.selectedId === ev.id;
      const isStudied = state.studied.has(ev.id);

      const item = document.createElement('div');
      item.className = 'timeline-item' + (isSelected ? ' selected' : '');
      item.dataset.id = ev.id;
      item.dataset.type = 'event';

      const connectedPeople = (ev.people || []).map(pid => personMap[pid]).filter(Boolean);
      const relatedEvents = (ev.related || []).map(eid => eventMap[eid]).filter(Boolean);

      item.innerHTML = `
        <div class="tl-year">${ev.year < 0 ? `${Math.abs(ev.year)} BC` : ev.year}</div>
        <div class="tl-dot" style="background:${color}; box-shadow: 0 0 6px ${color}66"></div>
        <div class="tl-card" style="border-left-color:${color}">
          ${isStudied ? '<div class="studied-badge">✓</div>' : ''}
          <div class="tl-card-header">
            <div class="tl-title">${ev.title}</div>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
              <div class="tl-era-badge" style="background:${color}22;color:${color}">${eraName(ev.era)}</div>
              <div class="tl-expand-icon">▼</div>
            </div>
          </div>
          <div class="tl-body">
            <div class="tl-description">${ev.description}</div>
            <div class="tl-connections">
              ${connectedPeople.length ? `
                <div>
                  <div class="tl-connections-label">Key People</div>
                  <div class="chip-row">
                    ${connectedPeople.map(p => `
                      <button class="chip" data-goto-person="${p.id}">
                        <span class="chip-dot" style="background:${eraColor(p.era)}"></span>
                        ${p.name}
                      </button>`).join('')}
                  </div>
                </div>` : ''}
              ${relatedEvents.length ? `
                <div>
                  <div class="tl-connections-label">Related Events</div>
                  <div class="chip-row">
                    ${relatedEvents.map(r => `
                      <button class="chip" data-goto-event="${r.id}">
                        <span class="chip-dot" style="background:${eraColor(r.era)}"></span>
                        ${r.year} — ${r.title}
                      </button>`).join('')}
                  </div>
                </div>` : ''}
            </div>
            <button class="studied-btn ${isStudied ? 'studied' : ''}" data-studied="${ev.id}">
              <span class="studied-check">${isStudied ? '✓' : '○'}</span>
              ${isStudied ? 'Studied' : 'Mark as studied'}
            </button>
          </div>
        </div>
      `;

      // Click card header to expand
      item.querySelector('.tl-card').addEventListener('click', e => {
        if (e.target.closest('.chip') || e.target.closest('.studied-btn')) return;
        selectItem('event', ev.id, item);
      });

      // Chip navigation
      item.querySelectorAll('[data-goto-person]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          switchTab('people');
          setTimeout(() => scrollToAndSelect('person', btn.dataset.gotoPerson), 100);
        });
      });
      item.querySelectorAll('[data-goto-event]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          scrollToAndSelect('event', btn.dataset.gotoEvent);
        });
      });

      // Studied button
      item.querySelector('.studied-btn').addEventListener('click', e => {
        e.stopPropagation();
        toggleStudied(ev.id, item.querySelector('.studied-btn'));
      });

      return item;
    }

    // ── CHUNK 5 — People ───────────────────────────────────
    function renderPeople() {
      const grid = document.getElementById('people-grid');
      const people = filteredPeople();

      if (people.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No people match your search.</div></div>`;
        return;
      }

      grid.innerHTML = '';

      people.forEach((person, i) => {
        const card = createPersonCard(person);
        card.style.transitionDelay = `${i * 30}ms`;
        grid.appendChild(card);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });

      requestAnimationFrame(() => {
        grid.querySelectorAll('.person-card').forEach(el => observer.observe(el));
      });
    }

    function createPersonCard(person) {
      const color = eraColor(person.era);
      const isSelected = state.selectedId === person.id;
      const isStudied = state.studied.has(person.id);

      const card = document.createElement('div');
      card.className = 'person-card' + (isSelected ? ' selected' : '');
      card.dataset.id = person.id;
      card.dataset.type = 'person';

      const connectedEvents = (person.events || []).map(eid => eventMap[eid]).filter(Boolean);
      const connectedPeople = (person.connected || []).map(pid => personMap[pid]).filter(Boolean);

      card.innerHTML = `
        ${isStudied ? '<div class="studied-badge">✓</div>' : ''}
        <div class="person-name">${person.name}</div>
        <div class="person-role">${person.role}</div>
        <div class="person-era-badge" style="background:${color}22;color:${color}">${eraName(person.era)}</div>
        <div class="person-body">
          <div class="person-description">${person.description}</div>
          <div class="tl-connections" style="margin-top:12px">
            ${connectedEvents.length ? `
              <div>
                <div class="tl-connections-label">Key Events</div>
                <div class="chip-row">
                  ${connectedEvents.map(ev => `
                    <button class="chip" data-goto-event="${ev.id}">
                      <span class="chip-dot" style="background:${eraColor(ev.era)}"></span>
                      ${ev.year} — ${ev.title}
                    </button>`).join('')}
                </div>
              </div>` : ''}
            ${connectedPeople.length ? `
              <div>
                <div class="tl-connections-label">Connected People</div>
                <div class="chip-row">
                  ${connectedPeople.map(p => `
                    <button class="chip" data-goto-person="${p.id}">
                      <span class="chip-dot" style="background:${eraColor(p.era)}"></span>
                      ${p.name}
                    </button>`).join('')}
                </div>
              </div>` : ''}
          </div>
          <button class="studied-btn ${isStudied ? 'studied' : ''}" data-studied="${person.id}">
            <span class="studied-check">${isStudied ? '✓' : '○'}</span>
            ${isStudied ? 'Studied' : 'Mark as studied'}
          </button>
        </div>
      `;

      card.addEventListener('click', e => {
        if (e.target.closest('.chip') || e.target.closest('.studied-btn')) return;
        selectItem('person', person.id, card);
      });

      card.querySelectorAll('[data-goto-event]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          switchTab('timeline');
          setTimeout(() => scrollToAndSelect('event', btn.dataset.gotoEvent), 100);
        });
      });

      card.querySelectorAll('[data-goto-person]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          scrollToAndSelect('person', btn.dataset.gotoPerson);
        });
      });

      card.querySelector('.studied-btn').addEventListener('click', e => {
        e.stopPropagation();
        toggleStudied(person.id, card.querySelector('.studied-btn'));
      });

      return card;
    }

    // ── CHUNK 4 — Selection + scroll ──────────────────────
    function selectItem(type, id, el) {
      // Deselect if same
      if (state.selectedId === id) {
        state.selectedId = null;
        state.selectedType = null;
        if (el) el.classList.remove('selected');
        clearConnections();
        return;
      }

      // Deselect previous
      document.querySelectorAll('.timeline-item.selected, .person-card.selected')
        .forEach(e => e.classList.remove('selected'));

      state.selectedId = id;
      state.selectedType = type;

      if (!el) {
        el = document.querySelector(`[data-id="${id}"]`);
      }
      if (el) {
        el.classList.add('selected');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // Draw connection lines after DOM settles
      setTimeout(() => drawConnections(type, id), 350);
    }

    function scrollToAndSelect(type, id) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => selectItem(type, id, el), 300);
      } else {
        // Not visible — re-render without era filter and try again
        state.era = null;
        renderEraFilters();
        if (type === 'event') renderTimeline();
        else renderPeople();
        setTimeout(() => {
          const el2 = document.querySelector(`[data-id="${id}"]`);
          if (el2) {
            el2.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => selectItem(type, id, el2), 300);
          }
        }, 200);
      }
    }

    // ── CHUNK 8 — Progress tracker ─────────────────────────
    function toggleStudied(id, btn) {
      if (state.studied.has(id)) {
        state.studied.delete(id);
        btn.classList.remove('studied');
        btn.innerHTML = '<span class="studied-check">○</span> Mark as studied';
        const badge = btn.closest('.timeline-item, .person-card')?.querySelector('.studied-badge');
        if (badge) badge.remove();
      } else {
        state.studied.add(id);
        btn.classList.add('studied');
        btn.innerHTML = '<span class="studied-check">✓</span> Studied';
        const card = btn.closest('.tl-card, .person-card');
        if (card && !card.querySelector('.studied-badge')) {
          const badge = document.createElement('div');
          badge.className = 'studied-badge';
          badge.textContent = '✓';
          card.appendChild(badge);
        }
      }
      saveStudied();
      updateProgress();
    }

    // ── CHUNK 7 — Quiz ─────────────────────────────────────
    function buildQuizDeck() {
      let items = [];
      if (state.quizType === 'mix' || state.quizType === 'events') {
        const evs = state.era ? EVENTS.filter(e => e.era === state.era) : EVENTS;
        items = items.concat(evs.map(e => ({ type: 'event', data: e })));
      }
      if (state.quizType === 'mix' || state.quizType === 'people') {
        const ppl = state.era ? PEOPLE.filter(p => p.era === state.era) : PEOPLE;
        items = items.concat(ppl.map(p => ({ type: 'person', data: p })));
      }
      // Shuffle
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function renderQuiz() {
      if (state.quizDeck.length === 0) {
        state.quizDeck = buildQuizDeck();
        state.quizIndex = 0;
        state.quizFlipped = false;
      }
      renderQuizCard();
    }

    function renderQuizCard() {
      const area = document.getElementById('quiz-area');

      if (state.quizIndex >= state.quizDeck.length) {
        area.innerHTML = `
          <div class="quiz-complete">
            <div class="quiz-complete-icon">🍁</div>
            <div class="quiz-complete-title">Deck Complete!</div>
            <div class="quiz-complete-sub">You've gone through all ${state.quizDeck.length} cards.</div>
            <button class="quiz-restart-btn" id="quiz-restart">Restart Deck</button>
          </div>`;
        document.getElementById('quiz-restart').addEventListener('click', () => {
          state.quizDeck = buildQuizDeck();
          state.quizIndex = 0;
          state.quizFlipped = false;
          renderQuizCard();
        });
        updateQuizProgress();
        return;
      }

      const card = state.quizDeck[state.quizIndex];
      const color = eraColor(card.data.era);
      const isFlipped = state.quizFlipped;

      let frontHTML, backHTML;

      if (card.type === 'event') {
        const ev = card.data;
        const people = (ev.people || []).map(pid => personMap[pid]).filter(Boolean);
        frontHTML = `
          <div class="quiz-front-label">What happened in…</div>
          <div class="quiz-front-year">${ev.year}</div>
          <div class="quiz-front-era" style="background:${color}33;color:${color}">${eraName(ev.era)}</div>
          <div class="quiz-flip-hint">↻ Click to reveal</div>`;
        backHTML = `
          <div class="quiz-back-type" style="color:${color}">EVENT · ${ev.year}</div>
          <div class="quiz-back-title">${ev.title}</div>
          <div class="quiz-back-desc">${ev.description}${people.length ? `<br><br><strong style="color:${color}">Key people:</strong> ${people.map(p => p.name).join(', ')}` : ''}</div>`;
      } else {
        const p = card.data;
        frontHTML = `
          <div class="quiz-front-label">Who is…</div>
          <div class="quiz-front-name">${p.name}</div>
          <div class="quiz-front-era" style="background:${color}33;color:${color}">${eraName(p.era)}</div>
          <div class="quiz-flip-hint">↻ Click to reveal</div>`;
        backHTML = `
          <div class="quiz-back-type" style="color:${color}">PERSON · ${eraName(p.era)}</div>
          <div class="quiz-back-title">${p.role}</div>
          <div class="quiz-back-desc">${p.description}</div>`;
      }

      area.innerHTML = `
        <div class="quiz-card-scene">
          <div class="quiz-card ${isFlipped ? 'flipped' : ''}" id="quiz-card">
            <div class="quiz-card-face quiz-card-front">${frontHTML}</div>
            <div class="quiz-card-face quiz-card-back">${backHTML}</div>
          </div>
        </div>
        <div class="quiz-actions" id="quiz-actions" style="${isFlipped ? '' : 'opacity:0;pointer-events:none'}">
          <button class="quiz-btn quiz-btn-again" id="quiz-again">↺ Review again</button>
          <button class="quiz-btn quiz-btn-got-it" id="quiz-gotit">✓ Got it</button>
        </div>`;

      document.getElementById('quiz-card').addEventListener('click', () => {
        state.quizFlipped = !state.quizFlipped;
        document.getElementById('quiz-card').classList.toggle('flipped');
        const actions = document.getElementById('quiz-actions');
        if (state.quizFlipped) {
          actions.style.opacity = '1';
          actions.style.pointerEvents = 'auto';
        }
      });

      document.getElementById('quiz-again').addEventListener('click', () => {
        // Move card to end of deck
        const [current] = state.quizDeck.splice(state.quizIndex, 1);
        state.quizDeck.push(current);
        state.quizFlipped = false;
        renderQuizCard();
      });

      document.getElementById('quiz-gotit').addEventListener('click', () => {
        state.studied.add(card.data.id);
        saveStudied();
        updateProgress();
        state.quizIndex++;
        state.quizFlipped = false;
        renderQuizCard();
      });

      updateQuizProgress();
    }

    function updateQuizProgress() {
      const total = state.quizDeck.length;
      const done = state.quizIndex;
      const pct = total > 0 ? (done / total) * 100 : 0;
      document.getElementById('quiz-progress-text').textContent = `${done} of ${total} cards`;
      document.getElementById('quiz-progress-fill').style.width = pct + '%';
    }

    // ── CHUNK 6 — SVG Connection Lines ─────────────────────
    let connectionRAF = null;
    let connectionSource = null;
    let connectionTargetIds = [];

    function drawConnections(type, id) {
      const svg = document.getElementById('connection-svg');
      const sourceEl = document.querySelector(`[data-id="${id}"]`);
      if (!sourceEl) { clearConnections(); return; }

      let targetIds = [];
      if (type === 'event') {
        const ev = eventMap[id];
        if (!ev) return;
        targetIds = [
          ...(ev.people || []),
          ...(ev.related || []),
        ];
      } else {
        const p = personMap[id];
        if (!p) return;
        targetIds = [
          ...(p.events || []),
          ...(p.connected || []),
        ];
      }

      connectionSource = id;
      connectionTargetIds = targetIds;

      paintLines(svg, sourceEl, targetIds);

      // Redraw on scroll
      const scroller = document.getElementById('main-content');
      scroller.addEventListener('scroll', onScrollRedraw, { passive: true });
      window.addEventListener('scroll', onScrollRedraw, { passive: true });
    }

    function onScrollRedraw() {
      if (connectionRAF) cancelAnimationFrame(connectionRAF);
      connectionRAF = requestAnimationFrame(() => {
        const svg = document.getElementById('connection-svg');
        const sourceEl = document.querySelector(`[data-id="${connectionSource}"]`);
        if (sourceEl) paintLines(svg, sourceEl, connectionTargetIds);
      });
    }

    function paintLines(svg, sourceEl, targetIds) {
      svg.innerHTML = '';
      const srcRect = sourceEl.getBoundingClientRect();
      const srcX = srcRect.right - 20;
      const srcY = srcRect.top + srcRect.height / 2;

      let delay = 0;
      targetIds.forEach(tid => {
        const targetEl = document.querySelector(`[data-id="${tid}"]`);
        if (!targetEl) return;

        const tRect = targetEl.getBoundingClientRect();
        // Skip off-screen targets
        if (tRect.bottom < 0 || tRect.top > window.innerHeight) return;

        const tX = tRect.left + 12;
        const tY = tRect.top + tRect.height / 2;

        // Determine color from target
        const targetEvent = eventMap[tid];
        const targetPerson = personMap[tid];
        const color = targetEvent ? eraColor(targetEvent.era)
                    : targetPerson ? eraColor(targetPerson.era)
                    : '#888';

        // Bezier control point — curves to the right
        const cpX = Math.max(srcX, tX) + 60;
        const cpY = (srcY + tY) / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const d = `M ${srcX} ${srcY} Q ${cpX} ${cpY} ${tX} ${tY}`;
        path.setAttribute('d', d);
        path.setAttribute('stroke', color);
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');

        // Animate draw
        const length = 600; // approximate
        path.style.strokeDasharray = length;
        path.style.strokeDashoffset = length;
        path.style.opacity = '0.65';
        path.style.transition = `stroke-dashoffset 0.5s cubic-bezier(0.4,0,0.2,1) ${delay}ms, opacity 0.3s ease ${delay}ms`;

        svg.appendChild(path);

        // Trigger animation
        requestAnimationFrame(() => {
          path.style.strokeDashoffset = '0';
        });

        // Highlight target card
        targetEl.style.outline = `2px solid ${color}66`;
        targetEl.style.outlineOffset = '2px';

        delay += 80;
      });
    }

    function clearConnections() {
      const svg = document.getElementById('connection-svg');
      svg.innerHTML = '';
      connectionSource = null;
      connectionTargetIds = [];
      window.removeEventListener('scroll', onScrollRedraw);
      document.getElementById('main-content')?.removeEventListener('scroll', onScrollRedraw);
      // Remove highlights
      document.querySelectorAll('[data-id]').forEach(el => {
        el.style.outline = '';
        el.style.outlineOffset = '';
      });
    }

    // ── Tab switching ──────────────────────────────────────
    function switchTab(tab) {
      state.tab = tab;
      state.selectedId = null;
      state.selectedType = null;
      clearConnections();

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });

      const timeline = document.getElementById('timeline-view');
      const people   = document.getElementById('people-view');
      const quiz     = document.getElementById('quiz-view');

      timeline.style.display = tab === 'timeline' ? 'block' : 'none';
      people.style.display   = tab === 'people'   ? 'block' : 'none';
      quiz.style.display     = tab === 'quiz'      ? 'block' : 'none';

      if (tab === 'timeline') renderTimeline();
      if (tab === 'people')   renderPeople();
      if (tab === 'quiz') {
        state.quizDeck = buildQuizDeck();
        state.quizIndex = 0;
        state.quizFlipped = false;
        renderQuiz();
      }
    }

    // ── Init ───────────────────────────────────────────────
    function init() {
      // Tab nav
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      // Quiz type toggle
      document.querySelectorAll('.quiz-type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.quizType = btn.dataset.type;
          document.querySelectorAll('.quiz-type-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.quizDeck = buildQuizDeck();
          state.quizIndex = 0;
          state.quizFlipped = false;
          renderQuiz();
        });
      });

      // Search
      document.getElementById('search-input').addEventListener('input', e => {
        state.query = e.target.value.trim();
        clearConnections();
        state.selectedId = null;
        if (state.tab === 'timeline') renderTimeline();
        if (state.tab === 'people')   renderPeople();
      });

      // Click outside cards to clear connections
      document.getElementById('main-content').addEventListener('click', e => {
        if (!e.target.closest('.tl-card') && !e.target.closest('.person-card')) {
          clearConnections();
          document.querySelectorAll('.timeline-item.selected, .person-card.selected')
            .forEach(el => el.classList.remove('selected'));
          state.selectedId = null;
          state.selectedType = null;
        }
      });

      // Initial render
      renderEraFilters();
      updateProgress();
      switchTab('timeline');
    }

    init();
  </script>
</body>
</html>
